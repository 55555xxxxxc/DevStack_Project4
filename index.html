<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Temperature Converter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Temperature Converter</h1>

        <p>Convert between Celsius, Fahrenheit and Kelvin</p>

        <div class="input-group">

            <label for="temperature">
                Enter Temperature
            </label>

            <input
                type="number"
                id="temperature"
                placeholder="Enter value"
            >

        </div>


        <div class="input-group">

            <label for="unit">
                Select Unit
            </label>

            <select id="unit">

                <option value="celsius">
                    Celsius (°C)
                </option>

                <option value="fahrenheit">
                    Fahrenheit (°F)
                </option>

                <option value="kelvin">
                    Kelvin (K)
                </option>

            </select>

        </div>


        <button onclick="convertTemperature()">
            Convert Temperature
        </button>


        <button class="clear-btn" onclick="clearResult()">
            Clear
        </button>


        <div id="result">

            <p id="celsiusResult">
                Celsius: -
            </p>

            <p id="fahrenheitResult">
                Fahrenheit: -
            </p>

            <p id="kelvinResult">
                Kelvin: -
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
